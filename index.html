<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjimnazi Milot - Lajmet</title>

    <!-- Bootstrap 3 CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <style>
        .njoftim-card {
            background: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
        }
        .njoftim-date {
            font-weight: bold;
            margin-bottom: 10px;
            color: #337ab7;
        }
        .tag {
            display: inline-block;
            background: #3b5998;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<!-- Facebook SDK -->
<div id="fb-root"></div>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/sq_AL/sdk.js#xfbml=1&version=v18.0"></script>

<div class="container">
    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            
            <!-- CAROUSEL -->
            <div id="lajmet-carousel" class="carousel slide" data-ride="carousel" data-interval="5000">
                <div class="carousel-inner" role="listbox">
                    
                    <!-- FAQJA 1: ZVAP -->
                    <div class="item active">
                        <article class="njoftim-card">
                            <div class="njoftim-date">ZVAP Kurbin</div>
                            <div class="fb-page" 
                                 data-href="https://www.facebook.com/profile.php?id=100064178460927" 
                                 data-tabs="timeline" 
                                 data-width="500" 
                                 data-height="400" 
                                 data-small-header="false" 
                                 data-adapt-container-width="true" 
                                 data-hide-cover="false" 
                                 data-show-facepile="true">
                            </div>
                            <a href="https://www.facebook.com/profile.php?id=100064178460927" target="_blank" style="display: block; margin-top: 15px;">
                                <span class="tag">Facebook - Shiko më shumë</span>
                            </a>
                        </article>
                    </div>

                    <!-- FAQJA 2: AKAP -->
                    <div class="item">
                        <article class="njoftim-card">
                            <div class="njoftim-date">AKAP</div>
                            <div class="fb-page" 
                                 data-href="https://www.facebook.com/arsimiparauniversitar" 
                                 data-tabs="timeline" 
                                 data-width="500" 
                                 data-height="400" 
                                 data-small-header="false" 
                                 data-adapt-container-width="true" 
                                 data-hide-cover="false" 
                                 data-show-facepile="true">
                            </div>
                            <a href="https://www.facebook.com/arsimiparauniversitar" target="_blank" style="display: block; margin-top: 15px;">
                                <span class="tag">Facebook - Shiko më shumë</span>
                            </a>
                        </article>
                    </div>

                    <!-- FAQJA 3: ASCAP -->
                    <div class="item">
                        <article class="njoftim-card">
                            <div class="njoftim-date">ASCAP</div>
                            <div class="fb-page" 
                                 data-href="https://www.facebook.com/ASCAP2020" 
                                 data-tabs="timeline" 
                                 data-width="500" 
                                 data-height="400" 
                                 data-small-header="false" 
                                 data-adapt-container-width="true" 
                                 data-hide-cover="false" 
                                 data-show-facepile="true">
                            </div>
                            <a href="https://www.facebook.com/ASCAP2020" target="_blank" style="display: block; margin-top: 15px;">
                                <span class="tag">Facebook - Shiko më shumë</span>
                            </a>
                        </article>
                    </div>

                </div>
                
                <!-- Kontrollet e Carousel -->
                <a class="left carousel-control" href="#lajmet-carousel" role="button" data-slide="prev">
                    <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
                    <span class="sr-only">Para</span>
                </a>
                <a class="right carousel-control" href="#lajmet-carousel" role="button" data-slide="next">
                    <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
                    <span class="sr-only">Pas</span>
                </a>
            </div>

        </div>
    </div>
</div>

<!-- jQuery dhe Bootstrap JS -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

</body>
</html>
