<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjimnazi Milot - Njoftime</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    
    <style>
        /* ==================================================
           RRITJA E STABILITETIT TË LAYOUT-IT
           ================================================== */
        
        /* 1. DETYRO FACEBOOK PLUGIN TË JETË RESPONSIVE */
        /* Kjo pjesë është çelësi që Chrome mos të prishë dizajnin */
        .fb-page, .fb-page span, .fb-page span iframe {
            width: 100% !important;
            max-width: 500px !important; /* Nuk lejon të zgjerohet më shumë se 500px */
            display: block !important;
        }

        /* 2. IZOLIMI I KARTAVE */
        .njoftim-card {
            background: #fff;
            padding: 20px;
            border: 1px solid #e3e8ee;
            border-radius: 12px;
            min-height: 500px; /* Parandalon ndryshimin e lartësisë */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fb-karta-qender {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Carousel rregullime */
        #lajmet-carousel { width: 100%; max-width: 600px; margin: 0 auto; }
        
        /* Siguro që carousel-i të mos ketë scroll horizontal */
        html, body { overflow-x: hidden; }

        /* Pjesa tjetër e stileve tuaja ... */
        .njoftim-date { font-weight: bold; margin-bottom: 10px; color: #337ab7; font-size: 18px; }
        .tag { display: inline-block; background: #1a2a6c; color: white; padding: 5px 15px; border-radius: 4px; text-decoration: none; margin-top: 15px; }
    </style>
</head>

<body>

    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/sq_AL/sdk.js#xfbml=1&version=v18.0"></script>

    <div class="container">
        <div id="lajmet-carousel" class="carousel slide" data-ride="carousel">
            <div class="carousel-inner">
                
                <div class="item active">
                    <article class="njoftim-card fb-karta-qender">
                        <div class="njoftim-date">ZVAP Kurbin</div>
                        <div class="fb-page" 
                             data-href="https://www.facebook.com/profile.php?id=100064178460927" 
                             data-tabs="timeline" 
                             data-width="500" 
                             data-height="400" 
                             data-adapt-container-width="true" 
                             data-small-header="false" 
                             data-hide-cover="false" 
                             data-show-facepile="true">
                        </div>
                        <a href="https://www.facebook.com/profile.php?id=100064178460927" target="_blank">
                            <span class="tag">Facebook-shiko më shumë</span>
                        </a>
                    </article>
                </div>

                <div class="item">
                    <article class="njoftim-card fb-karta-qender">
                        <div class="njoftim-date">AKAP</div>
                        <div class="fb-page" 
                             data-href="https://www.facebook.com/arsimiparauniversitar" 
                             data-tabs="timeline" 
                             data-width="500" 
                             data-height="400" 
                             data-adapt-container-width="true" 
                             data-small-header="false" 
                             data-hide-cover="false" 
                             data-show-facepile="true">
                        </div>
                        <a href="https://www.facebook.com/arsimiparauniversitar" target="_blank">
                            <span class="tag">Facebook-shiko më shumë</span>
                        </a>
                    </article>
                </div>

            </div>
            
            <a class="left carousel-control" href="#lajmet-carousel" data-slide="prev">
                <span class="glyphicon glyphicon-chevron-left"></span>
            </a>
            <a class="right carousel-control" href="#lajmet-carousel" data-slide="next">
                <span class="glyphicon glyphicon-chevron-right"></span>
            </a>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
