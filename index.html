    <style>
        body { overflow-x: hidden; font-family: sans-serif; }
        .navbar-custom { background-color: #1a2a6c; border: none; padding: 15px 0; }
        .navbar-custom .navbar-brand { color: #ffffff !important; font-weight: 600; }

        .shirit-njoftime-kontainer-madh { width: 100%; overflow: hidden; padding: 20px 0; }

        @keyframes rrjedhshmeri {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @media (max-width: 767px) {
            .fb-fixed-wrapper { height: 400px; }
