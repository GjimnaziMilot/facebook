<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjimnazi Milot - Njoftime</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    
    <style>
        /* =========================
           CSS I INTEGRUAR DHE RESPONSIVE
        ========================= */
        html, body { overflow-x: hidden !important; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f4; color: #333; }
        *, *:before, *:after { box-sizing: border-box; }

        /* NAVBAR */
        .navbar-custom { background-color: #1a2a6c; border: none; padding: 15px 0; }
        .navbar-custom .navbar-brand { color: #ffffff !important; font-weight: 600; }
        .navbar-custom .navbar-nav > li > a { color: #ffffff !important; }
        .navbar-custom .navbar-toggle .icon-bar { background-color: #ffffff !important; }

        /* CONTENT */
        .main-content { width: 95%; max-width: 1000px; margin: 40px auto; }
        .njoftime-section { background-color: #ffffff; padding: 20px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }

        /* KARTAT */
        .njoftim-card { display: flex; background-color: #ffffff; border: 1px solid #e5e5e5; border-left: 5px solid #1a2a6c; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        .njoftim-date { width: 150px; background-color: #f7f7f7; display: flex; justify-content: center; align-items: center; padding: 15px; font-weight: bold; color: #1a2a6c; text-align: center; }
        .njoftim-content { flex: 1; padding: 20px; }

        /* CAROUSEL DHE FACEBOOK */
        #lajmet-carousel { width: 100%; max-width: 600px; margin: 0 auto; }
        .fb-page { width: 100% !important; }

        /* TICKER (SHIRITI) */
        .shirit-njoftime-kontainer-madh { width: 100%; overflow: hidden; background: white; border-radius: 8px; padding: 15px; }
        .shirit-njoftime-track { display: flex; width: max-content; animation: levizShiritin 40s linear infinite; }
        .ticker-item { width: 300px; margin-right: 20px; flex-shrink: 0; }
        @keyframes levizShiritin { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* RESPONSIVE PËR CELULARË */
        @media (max-width: 768px) {
            .njoftim-card, .ticker-item { flex-direction: column; width: 100% !important; }
            .njoftim-date { width: 100%; border-left: none; border-bottom: 2px solid #e5e5e5; }
            .section-header h2 { font-size: 22px; }
        }
    </style>
</head>

<body>

    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/sq_AL/sdk.js#xfbml=1&version=v18.0"></script>

    <nav class="navbar navbar-custom">
        <div class="container">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#myNavbar">
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="index.html">Gjimnazi Milot</a>
            </div>
            <div class="collapse navbar-collapse" id="myNavbar">
                <ul class="nav navbar-nav navbar-right">
                    <li class="active"><a href="njof.html">Njoftime</a></li>
                    <li><a href="matura.html">Matura Shtetërore</a></li>
                    <li><a href="Organizimi.html">Organizimi i shkollës</a></li>
                    <li><a href="aktivitete.html">Aktivitete</a></li>
                    <li><a href="kontakt.html">Kontakt</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="njoftime-section">
            <div class="text-center" style="margin-bottom: 30px;">
                <h2>Informacione dhe Lajme</h2>
                <div class="underline" style="width: 50px; height: 3px; background: #ffca28; margin: 10px auto;"></div>
            </div>

            <!-- CAROUSEL -->
            <div id="lajmet-carousel" class="carousel slide" data-ride="carousel">
                <div class="carousel-inner" role="listbox">
                    <div class="item active">
                        <article class="njoftim-card">
                            <div class="njoftim-date">ZVAP Kurbin</div>
                            <div class="njoftim-content">
                                <div class="fb-page" data-href="https://www.facebook.com/profile.php?id=100064178460927" data-tabs="timeline" data-adapt-container-width="true" data-hide-cover="false" data-show-facepile="true"></div>
                            </div>
                        </article>
                    </div>
                </div>
            </div>

            <!-- NJOFTIME TICKER -->
            <div class="shirit-njoftime-kontainer-madh" style="margin-top: 40px;">
                <div class="shirit-njoftime-track">
                    <article class="njoftim-card ticker-item">
                        <div class="njoftim-date">12 Maj 2026</div>
                        <div class="njoftim-content">
                            <h3>Viti shkollor 2026</h3>
                            <p>Sezoni i ri fillon 14 shtator.</p>
                        </div>
                    </article>
                    <!-- Shto artikuj të tjerë këtu -->
                </div>
            </div>
        </section>
    </main>

    <footer style="background: #000; color: #fff; text-align: center; padding: 20px;">
        <p>&copy; 2026 Gjimnazi Milot.</p>
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</body>
</html>
